{% extends "base.html" %}

{% block content %}
  <h2 class="d-flex justify-content-between align-items-center">
    Tags
    <a href="{% url 'todo:tag-create' %}"
       class="btn btn-primary link-to-page">
      Add
    </a>
  </h2>

  {% if tag_list %}
    <table class="table">
      <tr>
        <th>Name</th>
        <th>Update</th>
        <th>Delete</th>
      </tr>

      {% for tag in tag_list %}
        <tr>
          <td>
            {{ tag.name }}
          </td>
          <td>
            <a class="btn btn-info link-to-page"
               href="{% url "todo:tag-update" pk=tag.id %}">
              Update
            </a>
          </td>
          <td>
            <a class="btn btn-danger link-to-page"
               href="{% url "todo:tag-delete" pk=tag.id %}">
              Delete
            </a>
          </td>
        </tr>
      {% endfor %}
    </table>

  {% else %}
    <p>No tags found.</p>
  {% endif %}
{% endblock %}
